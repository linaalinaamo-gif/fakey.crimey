# Netlify Configuration for Fakey.Crimey
# https://docs.netlify.com/configure-builds/file-based-configuration

[build]
  # Next.js build command
  command = "npm run build"
  
  # Output directory (where Next.js exports static files)
  publish = ".next"
  
  # Functions directory for serverless functions
  functions = "netlify/functions"

[build.environment]
  # Node version for build
  NODE_VERSION = "18.17.0"
  
  # Next.js environment
  NEXT_ENV = "production"

# Redirect all routes to index for Next.js SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API routes - don't redirect
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Cache policies
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Don't cache HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets longer
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/_next/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Context-specific settings
[context.production]
  command = "npm run build"
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
